<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniLyrics 设置</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --fg: #ffffff;
      --border: #333;
      --accent: #00ffff;
      --danger: #ff6b6b;
      --card-bg: rgba(255,255,255,0.05);
      --sidebar-width: 140px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, Arial;
      background: var(--bg);
      color: var(--fg);
      padding: 20px;
      min-height: 100vh;
    }

    /* 主容器 */
    .settings-container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 顶部标题栏 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 1.5rem;
    }
    .close-btn {
      background: none;
      border: none;
      color: var(--fg);
      font-size: 1.5rem;
      cursor: pointer;
      text-decoration: none;
    }
    .close-btn:hover { opacity: 0.8; }

    /* 顶部Tab切换 */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 0;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #888;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      color: var(--fg);
    }
    .tab-btn.active {
      background: var(--accent);
      color: #000;
    }

    /* 主体布局 */
    .main-layout {
      display: none;
      grid-template-columns: var(--sidebar-width) 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .main-layout.active {
      display: grid;
    }

    /* 左侧边栏 */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-section-title {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      margin: 12px 0 8px 0;
    }
    .sidebar-section-title:first-child {
      margin-top: 0;
    }
    .side-option {
      padding: 10px 12px;
      background: rgba(0,0,0,0.2);
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .side-option:hover {
      border-color: #444;
    }
    .side-option.active {
      border-color: var(--accent);
      background: rgba(0,255,255,0.1);
    }
    .side-option input { display: none; }

    /* 右侧内容区 */
    .content {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .content-card {
      display: none;
    }
    .content-card.active {
      display: block;
    }

    /* 通用卡片样式 */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* 表单网格 */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    .form-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-item label {
      font-size: 0.85rem;
      color: #aaa;
    }
    .form-item input,
    .form-item select {
      padding: 10px 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-size: 0.95rem;
      width: 100%;
    }
    .form-item input:focus,
    .form-item select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-item input[type="color"] {
      height: 42px;
      padding: 4px;
      cursor: pointer;
    }

    /* 开关样式 */
    .switch-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
    }
    .switch-label {
      font-size: 0.95rem;
    }
    .switch {
      position: relative;
      width: 48px;
      height: 26px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .switch-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #444;
      transition: 0.3s;
      border-radius: 26px;
    }
    .switch-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    .switch input:checked + .switch-slider {
      background-color: var(--accent);
    }
    .switch input:checked + .switch-slider:before {
      transform: translateX(22px);
    }

    /* 歌词源列表 */
    .source-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .source-item {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
    }
    .source-name {
      font-weight: bold;
      min-width: 80px;
    }
    .source-priority {
      width: 60px;
      text-align: center;
    }
    .source-apps {
      flex: 1;
    }
    .source-apps input {
      width: 100%;
    }

    /* Range */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: #444;
      border-radius: 2px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      margin-top: -5px;
    }
    input[type="range"]::-moz-range-track {
      height: 4px;
      background: #444;
      border-radius: 2px;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      border: none;
    }

    /* 按钮 */
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover {
      background: #00cccc;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--fg);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }

    /* 状态 */
    .status {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #888;
      text-align: center;
    }
    .status.success { color: #4caf50; }
    .status.error { color: var(--danger); }

    /* 隐藏 */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="settings-container">
    <div class="header">
      <h1>OmniLyrics 设置</h1>
      <a href="index.html" class="close-btn" title="关闭">×</a>
    </div>

    <!-- 顶部Tab切换 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="lyrics">歌词源设置</button>
      <button class="tab-btn" data-tab="display">展示设置</button>
    </div>

    <!-- 歌词源设置布局 -->
    <div class="main-layout active" data-layout="lyrics">
      <div class="sidebar">
        <div class="sidebar-section-title">歌词源</div>
        <div class="side-option active" data-panel="source-list">
          <input type="radio" name="lyrics-panel" value="source-list" checked>
          源列表
        </div>
      </div>
      <div class="content">
        <div class="content-card active" data-panel="source-list">
          <div class="card">
            <div class="card-title">歌词源配置</div>
            <div class="form-item" style="margin-bottom: 16px;">
              <label>请求超时 (毫秒)</label>
              <input type="number" id="lyrics-timeout" value="5000" min="1000" max="30000" step="500">
            </div>
            <div class="form-item" style="margin-bottom: 16px;">
              <label>搜索失败重试次数</label>
              <input type="number" id="lyrics-retry" value="1" min="0" max="3">
            </div>
            <div class="source-list" id="source-list">
              <!-- 动态生成 -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 展示设置布局 -->
    <div class="main-layout" data-layout="display">
      <div class="sidebar">
        <div class="sidebar-section-title">展示模式</div>
        <div class="side-option active" data-panel="mode-karaoke">
          <input type="radio" name="display-mode" value="karaoke">
          单行卡拉OK
        </div>
        <div class="side-option" data-panel="mode-scroll">
          <input type="radio" name="display-mode" value="scroll">
          双行滚动
        </div>
        <div class="side-option" data-panel="mode-blur">
          <input type="radio" name="display-mode" value="blur">
          多行渐变模糊
        </div>
      </div>
      <div class="content">
        <!-- 通用设置 -->
        <div class="content-card active" data-panel="mode-karaoke">
          <div class="card">
            <div class="card-title">通用设置</div>
            <div class="form-grid">
              <div class="form-item">
                <label>字体颜色</label>
                <input type="color" id="textColor" value="#ffffff">
              </div>
              <div class="form-item">
                <label>背景色</label>
                <input type="color" id="bgColor" value="#000000">
              </div>
              <div class="form-item">
                <label>字体大小</label>
                <input type="text" id="fontSize" value="2.4rem">
              </div>
              <div class="form-item">
                <label>发光范围 (<span id="glowRangeValue">1</span>)</label>
                <input type="range" id="glowRange" min="0" max="20" value="1">
              </div>
              <div class="form-item">
                <label>轮廓宽度 (<span id="outlineWidthValue">1</span>)</label>
                <input type="range" id="outlineWidth" min="0" max="10" value="1">
              </div>
              <div class="form-item">
                <label>轮廓颜色</label>
                <input type="color" id="outlineColor" value="#ffffff">
              </div>
              <div class="form-item">
                <label>西文字体</label>
                <select id="fontFamilyLatin"></select>
              </div>
              <div class="form-item">
                <label>中日韩字体</label>
                <select id="fontFamilyCJK"></select>
              </div>
              <div class="form-item" style="grid-column: 1 / -1;">
                <label>预览</label>
                <div id="fontPreview" style="
                  padding: 16px; 
                  background: rgba(0,0,0,0.3); 
                  border-radius: 6px; 
                  font-size: 1.5rem;
                  text-align: center;
                  color: #fff;
                  text-shadow: 0 0 10px rgba(0,255,255,0.8);
                ">Hello World 歌词预览</div>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-title">单行卡拉OK 参数</div>
            <div class="switch-wrapper">
              <span class="switch-label">逐字动画</span>
              <label class="switch">
                <input type="checkbox" id="wordAnimation" checked>
                <span class="switch-slider"></span>
              </label>
            </div>
            <div class="form-grid" style="margin-top: 16px;">
              <div class="form-item">
                <label>动画时长 (秒)</label>
                <input type="number" id="animationDuration" value="0.3" step="0.1" min="0.1">
              </div>
              <div class="form-item">
                <label>当前字缩放</label>
                <input type="number" id="currentScale" value="1.05" step="0.01" min="1" max="2">
              </div>
            </div>
          </div>
        </div>

        <div class="content-card" data-panel="mode-scroll">
          <div class="card">
            <div class="card-title">通用设置</div>
            <div class="form-grid">
              <div class="form-item">
                <label>字体颜色</label>
                <input type="color" id="scroll-textColor" value="#ffffff">
              </div>
              <div class="form-item">
                <label>背景色</label>
                <input type="color" id="scroll-bgColor" value="#000000">
              </div>
              <div class="form-item">
                <label>字体大小</label>
                <input type="text" id="scroll-fontSize" value="2.4rem">
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-title">双行滚动 参数</div>
            <div class="switch-wrapper">
              <span class="switch-label">显示下一行</span>
              <label class="switch">
                <input type="checkbox" id="showNext" checked>
                <span class="switch-slider"></span>
              </label>
            </div>
            <div class="form-grid" style="margin-top: 16px;">
              <div class="form-item">
                <label>下一行透明度</label>
                <input type="number" id="nextOpacity" value="0.6" step="0.1" min="0.1" max="1">
              </div>
              <div class="form-item">
                <label>滚动时长 (秒)</label>
                <input type="number" id="scrollDuration" value="0.4" step="0.1" min="0.1">
              </div>
            </div>
          </div>
        </div>

        <div class="content-card" data-panel="mode-blur">
          <div class="card">
            <div class="card-title">通用设置</div>
            <div class="form-grid">
              <div class="form-item">
                <label>字体颜色</label>
                <input type="color" id="blur-textColor" value="#ffffff">
              </div>
              <div class="form-item">
                <label>背景色</label>
                <input type="color" id="blur-bgColor" value="#000000">
              </div>
              <div class="form-item">
                <label>字体大小</label>
                <input type="text" id="blur-fontSize" value="2.4rem">
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-title">多行渐变模糊 参数</div>
            <div class="form-grid">
              <div class="form-item">
                <label>显示行数</label>
                <input type="number" id="visibleLines" value="9" min="3" max="15">
              </div>
              <div class="form-item">
                <label>行距</label>
                <input type="number" id="lineSpacing" value="1.5" step="0.1" min="1" max="3">
              </div>
              <div class="form-item">
                <label>亮度衰减</label>
                <input type="number" id="opacityDecay" value="0.15" step="0.05" min="0.05" max="0.5">
              </div>
              <div class="form-item">
                <label>模糊递增</label>
                <input type="number" id="blurIncrement" value="0.5" step="0.1" min="0.1">
              </div>
              <div class="form-item">
                <label>缩小比例</label>
                <input type="number" id="scaleDecay" value="0.1" step="0.05" min="0" max="0.5">
              </div>
              <div class="form-item">
                <label>最大模糊</label>
                <input type="number" id="blurMax" value="6" min="1" max="10">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部按钮 -->
    <div class="btn-group">
      <button class="btn btn-primary" id="saveBtn">保存配置</button>
      <button class="btn btn-secondary" id="resetBtn">恢复默认</button>
      <a href="index.html" class="btn btn-secondary">实时预览</a>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="scripts/config.js"></script>
  <script>
    const LYRICS_DEFAULT = {
      timeout: 5000,
      retry: 1,
      sources: [
        { name: 'lrclib', enabled: true, priority: 1, apps: ['*'] },
        { name: 'qqmusic', enabled: true, priority: 2, apps: ['QQMusic.exe', '*'] }
      ]
    };

    const RENDERER_DEFAULT = {
      mode: 'karaoke',
      colors: { text: '#ffffff', bg: '#000000', glowRange: 1, outlineWidth: 1, outlineColor: '#ffffff' },
      font: { size: '2.4rem' },
      modeParams: {
        karaoke: { wordAnimation: true, animationDuration: 0.3, currentScale: 1.05 },
        scroll: { showNext: true, nextOpacity: 0.6, scrollDuration: 0.4 },
        blur: { visibleLines: 9, lineSpacing: 1.5, opacityDecay: 0.15, blurIncrement: 0.5, scaleDecay: 0.1, blurMax: 6 }
      }
    };

    let lyricsConfig = null;
    let rendererConfig = null;

     // 加载配置
     async function loadConfig() {
       // 加载歌词配置
       try {
         const res = await fetch(`${CONFIG_API_BASE}/config/lyrics`);
         if (res.ok) {
           lyricsConfig = await res.json();
         }
       } catch (e) {
         console.warn('[Config] Use default lyrics config');
       }
       if (!lyricsConfig) lyricsConfig = LYRICS_DEFAULT;

       // 加载渲染配置
       await window.configManager.load();
       rendererConfig = window.configManager.get();

       await fillForms();
     }

    async function fillForms() {
       // 歌词源配置
       document.getElementById('lyrics-timeout').value = lyricsConfig.timeout || 5000;
       document.getElementById('lyrics-retry').value = lyricsConfig.retry || 1;
       renderSourceList(lyricsConfig.sources || []);

       // 渲染配置
       document.getElementById('textColor').value = (rendererConfig.colors?.text || '#ffffff').slice(0, 7);
       document.getElementById('bgColor').value = rendererConfig.colors?.bg || '#000000';
       document.getElementById('fontSize').value = rendererConfig.font?.size || '2.4rem';
       document.getElementById('glowRange').value = rendererConfig.colors?.glowRange || 1;
       document.getElementById('glowRangeValue').textContent = document.getElementById('glowRange').value;
       document.getElementById('outlineWidth').value = rendererConfig.colors?.outlineWidth || 1;
       document.getElementById('outlineWidthValue').textContent = document.getElementById('outlineWidth').value;
       document.getElementById('outlineColor').value = rendererConfig.colors?.outlineColor || '#ffffff';

       // 加载字体列表并填充
       await loadSystemFonts();

       // 更新预览
       updateFontPreview();

       const karaoke = rendererConfig.modeParams?.karaoke || RENDERER_DEFAULT.modeParams.karaoke;
       document.getElementById('wordAnimation').checked = karaoke.wordAnimation !== false;
       document.getElementById('animationDuration').value = karaoke.animationDuration;
       document.getElementById('currentScale').value = karaoke.currentScale;

       const scroll = rendererConfig.modeParams?.scroll || RENDERER_DEFAULT.modeParams.scroll;
       document.getElementById('showNext').checked = scroll.showNext !== false;
       document.getElementById('nextOpacity').value = scroll.nextOpacity;
       document.getElementById('scrollDuration').value = scroll.scrollDuration;

       const blur = rendererConfig.modeParams?.blur || RENDERER_DEFAULT.modeParams.blur;
       document.getElementById('visibleLines').value = blur.visibleLines;
       document.getElementById('lineSpacing').value = blur.lineSpacing;
       document.getElementById('opacityDecay').value = blur.opacityDecay;
       document.getElementById('blurIncrement').value = blur.blurIncrement;
       document.getElementById('scaleDecay').value = blur.scaleDecay;
       document.getElementById('blurMax').value = blur.blurMax;
    }

    // 加载系统字体列表
    async function loadSystemFonts() {
      try {
        const response = await fetch(`${CONFIG_API_BASE}/fonts`);
        const data = await response.json();
        if (!data.success || !data.fonts) return;

        const fonts = data.fonts;
        const latinSelect = document.getElementById('fontFamilyLatin');
        const cjkSelect = document.getElementById('fontFamilyCJK');

        const cjkKeywords = ['YaHei', 'Hei', 'Song', 'Kai', 'Ming', 'Fang', 'SC', 'TC', 'CN', 'JP', 'KR', 'Noto', 'WenQuanYi', 'Droid', 'Source Han', 'PingFang', 'Hiragino'];

        fonts.forEach(font => {
          const name = font.name;
          const isCJK = cjkKeywords.some(kw => name.includes(kw)) || /[\u4e00-\u9fff]/.test(name);

          const opt1 = document.createElement('option');
          opt1.value = name;
          opt1.textContent = name;
          latinSelect.appendChild(opt1);

          if (isCJK) {
            const opt2 = document.createElement('option');
            opt2.value = name;
            opt2.textContent = name;
            cjkSelect.appendChild(opt2);
          }
        });

        // 设置选中值
        const fontFamily = rendererConfig.font?.family || 'Arial, Microsoft YaHei';
        const parts = fontFamily.split(',').map(f => f.trim());
        const latin = parts[0] || 'Arial';
        const cjk = parts[1] || 'Microsoft YaHei';

        latinSelect.value = latin;
        cjkSelect.value = cjk;
      } catch (e) {
        console.warn('[Fonts] Load failed:', e);
      }
    }

    function renderSourceList(sources) {
      const container = document.getElementById('source-list');
      container.innerHTML = sources.map((s, i) => `
        <div class="source-item">
          <label class="switch">
            <input type="checkbox" class="source-enabled" data-index="${i}" ${s.enabled ? 'checked' : ''}>
            <span class="switch-slider"></span>
          </label>
          <span class="source-name">${s.name}</span>
          <input type="number" class="source-priority" data-index="${i}" value="${s.priority}" min="1" max="10">
          <input type="text" class="source-apps" data-index="${i}" value="${(s.apps || []).join(', ')}" placeholder="适用App，如 *">
        </div>
      `).join('');
    }

    function collectLyricsConfig() {
      const sources = [];
      document.querySelectorAll('.source-item').forEach((item, i) => {
        const enabled = item.querySelector('.source-enabled').checked;
        const priority = parseInt(item.querySelector('.source-priority').value);
        const apps = item.querySelector('.source-apps').value.split(',').map(a => a.trim()).filter(a => a);
        sources.push({ name: ['lrclib', 'qqmusic'][i], enabled, priority, apps });
      });
      return {
        timeout: parseInt(document.getElementById('lyrics-timeout').value),
        retry: parseInt(document.getElementById('lyrics-retry').value),
        sources
      };
    }

    function collectRendererConfig() {
      const latinFont = document.getElementById('fontFamilyLatin').value;
      const cjkFont = document.getElementById('fontFamilyCJK').value;
      return {
        mode: 'karaoke',
        colors: {
          text: document.getElementById('textColor').value,
          bg: document.getElementById('bgColor').value,
          glowRange: parseInt(document.getElementById('glowRange').value),
          outlineWidth: parseInt(document.getElementById('outlineWidth').value),
          outlineColor: document.getElementById('outlineColor').value
        },
        font: {
          size: document.getElementById('fontSize').value,
          family: `${latinFont}, ${cjkFont}`
        },
        modeParams: {
          karaoke: {
            wordAnimation: document.getElementById('wordAnimation').checked,
            animationDuration: parseFloat(document.getElementById('animationDuration').value),
            currentScale: parseFloat(document.getElementById('currentScale').value)
          },
          scroll: {
            showNext: document.getElementById('showNext').checked,
            nextOpacity: parseFloat(document.getElementById('nextOpacity').value),
            scrollDuration: parseFloat(document.getElementById('scrollDuration').value)
          },
          blur: {
            visibleLines: parseInt(document.getElementById('visibleLines').value),
            lineSpacing: parseFloat(document.getElementById('lineSpacing').value),
            opacityDecay: parseFloat(document.getElementById('opacityDecay').value),
            blurIncrement: parseFloat(document.getElementById('blurIncrement').value),
            scaleDecay: parseFloat(document.getElementById('scaleDecay').value),
            blurMax: parseFloat(document.getElementById('blurMax').value)
          }
        }
      };
    }

    function showStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.innerHTML = msg;
      el.className = 'status ' + (isError ? 'error' : 'success');
      setTimeout(() => { el.textContent = ''; }, 5000);
    }

    // Tab切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const tab = btn.dataset.tab;
        document.querySelectorAll('.main-layout').forEach(layout => {
          layout.classList.toggle('active', layout.dataset.layout === tab);
        });
      });
    });

    // 侧边栏切换
    document.querySelectorAll('.side-option').forEach(opt => {
      opt.addEventListener('click', () => {
        // 找到父级 sidebar
        const sidebar = opt.closest('.sidebar');
        sidebar.querySelectorAll('.side-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        opt.querySelector('input').checked = true;

        const panel = opt.dataset.panel;
        opt.closest('.main-layout').querySelectorAll('.content-card').forEach(card => {
          card.classList.toggle('active', card.dataset.panel === panel);
        });
      });
    });

    // 字体预览更新
    function updateFontPreview() {
      const latinFont = document.getElementById('fontFamilyLatin').value;
      const cjkFont = document.getElementById('fontFamilyCJK').value;
      const textColor = document.getElementById('textColor').value;
      const glowRange = parseInt(document.getElementById('glowRange').value);
      const outlineWidth = parseInt(document.getElementById('outlineWidth').value);
      const outlineColor = document.getElementById('outlineColor').value;
      const fontSize = document.getElementById('fontSize').value;

      const preview = document.getElementById('fontPreview');
      if (preview) {
        preview.style.fontFamily = `"${latinFont}", "${cjkFont}", sans-serif`;
        preview.style.color = textColor;
        preview.style.fontSize = fontSize;
        preview.style.textShadow = glowRange > 0 ? `0 0 ${glowRange}px ${textColor}` : 'none';
        preview.style.webkitTextStroke = outlineWidth > 0 ? `${outlineWidth}px ${outlineColor}` : '0';
      }
    }

    // Range值更新
    document.getElementById('glowRange').addEventListener('input', e => {
      document.getElementById('glowRangeValue').textContent = e.target.value;
      updateFontPreview();
    });
    document.getElementById('outlineWidth').addEventListener('input', e => {
      document.getElementById('outlineWidthValue').textContent = e.target.value;
      updateFontPreview();
    });
    document.getElementById('fontFamilyLatin').addEventListener('change', updateFontPreview);
    document.getElementById('fontFamilyCJK').addEventListener('change', updateFontPreview);
    document.getElementById('textColor').addEventListener('input', updateFontPreview);
    document.getElementById('outlineColor').addEventListener('input', updateFontPreview);
    document.getElementById('fontSize').addEventListener('input', updateFontPreview);

    // 保存
    document.getElementById('saveBtn').addEventListener('click', async () => {
      // 保存歌词配置
      const lyricsData = collectLyricsConfig();
      try {
        await fetch(`${CONFIG_API_BASE}/config/lyrics`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(lyricsData)
        });
      } catch (e) {
        console.warn('[Save] Lyrics config save failed:', e);
      }

      // 保存渲染配置
      const rendererData = collectRendererConfig();
      await window.configManager.save(rendererData);

      showStatus('配置已保存，<a href="index.html" style="color: #00ffff;">点击查看效果</a>');
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
      lyricsConfig = LYRICS_DEFAULT;
      await window.configManager.reset();
      rendererConfig = window.configManager.get();
      fillForms();
      showStatus('已恢复默认配置');
    });

    loadConfig();
  </script>
</body>
</html>

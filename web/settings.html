<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniLyrics 设置</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --fg: #ffffff;
      --border: #333;
      --accent: #00ffff;
      --danger: #ff6b6b;
      --card-bg: rgba(255,255,255,0.05);
      --sidebar-width: 140px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, Arial;
      background: var(--bg);
      color: var(--fg);
      padding: 20px;
      min-height: 100vh;
    }

    /* 主容器 */
    .settings-container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 顶部标题栏 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 1.5rem;
    }
    .close-btn {
      background: none;
      border: none;
      color: var(--fg);
      font-size: 1.5rem;
      cursor: pointer;
      text-decoration: none;
    }
    .close-btn:hover { opacity: 0.8; }

    /* 顶部Tab切换 */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 0;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #888;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      color: var(--fg);
    }
    .tab-btn.active {
      background: var(--accent);
      color: #000;
    }

    /* 主体布局 */
    .main-layout {
      display: none;
      grid-template-columns: var(--sidebar-width) 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .main-layout.active {
      display: grid;
    }

    /* 左侧边栏 */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-section-title {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      margin: 12px 0 8px 0;
    }
    .sidebar-section-title:first-child {
      margin-top: 0;
    }
    .side-option {
      padding: 10px 12px;
      background: rgba(0,0,0,0.2);
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .side-option:hover {
      border-color: #444;
    }
    .side-option.active {
      border-color: var(--accent);
      background: rgba(0,255,255,0.1);
    }
    .side-option input { display: none; }

    /* 右侧内容区 */
    .content {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .content-card {
      display: none;
    }
    .content-card.active {
      display: block;
    }

    /* 通用卡片样式 */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* 表单网格 */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    .form-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-item label {
      font-size: 0.85rem;
      color: #aaa;
    }
    .form-item input,
    .form-item select {
      padding: 10px 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-size: 0.95rem;
      width: 100%;
    }
    .form-item input:focus,
    .form-item select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-item input[type="color"] {
      height: 42px;
      padding: 4px;
      cursor: pointer;
    }

    /* 开关样式 */
    .switch-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
    }
    .switch-label {
      font-size: 0.95rem;
    }
    .switch {
      position: relative;
      width: 48px;
      height: 26px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .switch-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #444;
      transition: 0.3s;
      border-radius: 26px;
    }
    .switch-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    .switch input:checked + .switch-slider {
      background-color: var(--accent);
    }
    .switch input:checked + .switch-slider:before {
      transform: translateX(22px);
    }

    /* 歌词源列表 */
    .source-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .source-item {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
    }
    .source-name {
      font-weight: bold;
      min-width: 80px;
    }
    .source-priority {
      width: 60px;
      text-align: center;
    }
    .source-apps {
      flex: 1;
    }
    .source-apps input {
      width: 100%;
    }

    /* Range */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: #444;
      border-radius: 2px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      margin-top: -5px;
    }
    input[type="range"]::-moz-range-track {
      height: 4px;
      background: #444;
      border-radius: 2px;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      border: none;
    }

    /* 按钮 */
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover {
      background: #00cccc;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--fg);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }

    /* 状态 */
    .status {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #888;
      text-align: center;
    }
    .status.success { color: #4caf50; }
    .status.error { color: var(--danger); }

    /* 隐藏 */
    .hidden { display: none !important; }

    /* 匹配规则列表 */
    .rules-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .rule-item {
      padding: 16px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .rule-item:hover {
      border-color: var(--accent);
    }
    .rule-item.fallback {
      border-left: 3px solid #888;
    }
    .rule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .rule-title {
      font-weight: bold;
    }
    .rule-actions {
      display: flex;
      gap: 8px;
    }
    .rule-actions button {
      padding: 4px 8px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 4px;
      color: var(--fg);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .rule-actions button:hover {
      background: rgba(255,255,255,0.2);
    }
    .rule-actions button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .rule-info {
      font-size: 0.9rem;
      color: #aaa;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .rule-sources {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .source-tag {
      padding: 2px 8px;
      background: rgba(0,255,255,0.1);
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: var(--bg);
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-weight: bold;
      font-size: 1.1rem;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--fg);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-body {
      padding: 20px;
    }
    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }

    /* 弹窗内歌词源配置 */
    .source-config-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .source-config-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
    }
    .source-config-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
    .source-config-name {
      font-weight: bold;
    }
    .source-config-priority {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
    }
    .source-config-priority input {
      width: 60px;
      padding: 6px 8px;
    }
  </style>
</head>
<body>
  <div class="settings-container">
    <div class="header">
      <h1>OmniLyrics 设置</h1>
      <a href="index.html" class="close-btn" title="关闭">×</a>
    </div>

    <!-- 顶部Tab切换 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="lyrics">歌词源设置</button>
      <button class="tab-btn" data-tab="display">展示设置</button>
    </div>

    <!-- 歌词源设置布局 -->
    <div class="main-layout active" data-layout="lyrics">
      <div class="sidebar">
        <div class="sidebar-section-title">歌词源</div>
        <div class="side-option active" data-panel="match-rules">
          <input type="radio" name="lyrics-panel" value="match-rules" checked>
          匹配规则
        </div>
      </div>
      <div class="content">
        <div class="content-card active" data-panel="match-rules">
          <div class="card">
            <div class="card-title" style="display: flex; justify-content: space-between; align-items: center;">
              <span>匹配规则</span>
              <button class="btn btn-primary" id="addRuleBtn" style="padding: 6px 16px; font-size: 0.9rem;">+ 新增规则</button>
            </div>
            <div class="form-item" style="margin-bottom: 16px;">
              <label>请求超时 (毫秒)</label>
              <input type="number" id="lyrics-timeout" value="5000" min="1000" max="30000" step="500">
            </div>
            <div class="form-item" style="margin-bottom: 16px;">
              <label>搜索失败重试次数</label>
              <input type="number" id="lyrics-retry" value="1" min="0" max="3">
            </div>
            <div class="rules-list" id="rules-list">
              <!-- 动态生成 -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 编辑规则弹窗 -->
    <div class="modal-overlay" id="ruleModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="modalTitle">编辑规则</span>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-item">
            <label>匹配的App名称</label>
            <input type="text" id="ruleAppName" placeholder="输入App名称">
            <small style="color: #888; font-size: 0.8rem;">留空表示其它所有app并作为最末尾规则</small>
          </div>
          <div class="form-item" style="margin-top: 16px;">
            <label>歌词源配置</label>
            <div class="source-config-list" id="sourceConfigList">
              <!-- 动态生成 -->
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="deleteRuleBtn" style="background: var(--danger);">删除规则</button>
          <div style="flex: 1;"></div>
          <button class="btn btn-secondary" id="cancelRuleBtn">取消</button>
          <button class="btn btn-primary" id="saveRuleBtn">确认</button>
        </div>
      </div>
    </div>

    <!-- 展示设置布局 -->
    <div class="main-layout" data-layout="display">
      <div class="sidebar">
        <div class="form-item">
          <label>当前模式</label>
          <select id="currentDisplayMode">
            <option value="karaoke">单行卡拉OK</option>
            <option value="scroll">双行滚动</option>
            <option value="blur">多行渐变模糊</option>
            <option value="pv">日式PV字幕</option>
          </select>
        </div>
        <div class="sidebar-section-title">展示模式</div>
        <div class="side-option active" data-panel="mode-karaoke">
          <input type="radio" name="display-mode" value="karaoke">
          单行卡拉OK
        </div>
        <div class="side-option" data-panel="mode-scroll">
          <input type="radio" name="display-mode" value="scroll">
          双行滚动
        </div>
        <div class="side-option" data-panel="mode-blur">
          <input type="radio" name="display-mode" value="blur">
          多行渐变模糊
        </div>
        <div class="side-option" data-panel="mode-pv">
          <input type="radio" name="display-mode" value="pv">
          日式PV字幕
        </div>
      </div>
      <div class="content">
        <!-- 通用设置 -->
        <div class="content-card active" data-panel="mode-karaoke">
          <div class="card">
<div class="card-title">字体和颜色</div>
             <div class="form-grid">
               <div class="form-item">
                 <label>字体颜色</label>
                 <input type="color" id="textColor" value="#ffffff">
               </div>
               <div class="form-item">
                 <label>背景色</label>
                 <input type="color" id="bgColor" value="#000000">
               </div>
               <div class="form-item">
                 <label>字体大小</label>
                 <input type="text" id="fontSize" value="2.4rem">
               </div>
               <div class="form-item">
                 <label>字体粗细</label>
                 <select id="fontWeight">
                   <option value="normal">正常</option>
                   <option value="bold">粗体</option>
                   <option value="100">100</option>
                   <option value="200">200</option>
                   <option value="300">300</option>
                   <option value="400">400</option>
                   <option value="500">500</option>
                   <option value="600">600</option>
                   <option value="700">700</option>
                   <option value="800">800</option>
                   <option value="900">900</option>
                 </select>
               </div>
               <div class="form-item">
                 <label>轮廓颜色</label>
                 <input type="color" id="outlineColor" value="#ffffff">
               </div>
               <div class="form-item">
                 <label>发光范围 (<span id="glowRangeValue">1</span>)</label>
                 <input type="range" id="glowRange" min="0" max="20" value="1">
               </div>
               <div class="form-item">
                 <label>轮廓宽度 (<span id="outlineWidthValue">1</span>)</label>
                 <input type="range" id="outlineWidth" min="0" max="10" value="1">
               </div>
               <div class="form-item">
                 <label>西文字体</label>
                 <select id="fontFamilyLatin"></select>
               </div>
               <div class="form-item">
                 <label>中日韩字体</label>
                 <select id="fontFamilyCJK"></select>
               </div>
               <div class="form-item" style="grid-column: 1 / -1;">
                 <label>预览</label>
                 <div id="fontPreview" style="
                   padding: 16px; 
                   background: rgba(0,0,0,0.3); 
                   border-radius: 6px; 
                   font-size: 1.5rem;
                   text-align: center;
                   color: #fff;
                   text-shadow: 0 0 10px rgba(0,255,255,0.8);
                 ">Hello World 歌词预览</div>
</div>
        </div>
          </div>
          <div class="card">
            <div class="card-title">动画参数</div>
            <div class="switch-wrapper">
              <span class="switch-label">逐字动画</span>
              <label class="switch">
                <input type="checkbox" id="wordAnimation" checked>
                <span class="switch-slider"></span>
              </label>
            </div>
            <div class="form-grid" style="margin-top: 16px;">
              <div class="form-item">
                <label>动画时长 (秒)</label>
                <input type="number" id="animationDuration" value="0.3" step="0.1" min="0.1">
              </div>
              <div class="form-item">
                <label>当前字缩放</label>
                <input type="number" id="currentScale" value="1.05" step="0.01" min="1" max="2">
              </div>
            </div>
          </div>
        </div>
        <div class="content-card" data-panel="mode-pv">
          <div class="card">
            <div class="card-title">PV模板</div>
            <div class="form-item">
              <label>选择模板</label>
              <select id="pv-template">
                <option value="pop_center">弹跳居中</option>
                <option value="fast_scatter">快速散射</option>
                <option value="cardStack">卡片堆叠</option>
              </select>
            </div>
          </div>
          <div class="card">
            <div class="card-title">基础设置</div>
            <div class="form-grid">
              <div class="form-item">
                <label>字号</label>
                <input type="text" id="pv-fontSize" value="48px">
              </div>
              <div class="form-item">
                <label>字重</label>
                <select id="pv-fontWeight">
                  <option value="400">细体</option>
                  <option value="500">中等</option>
                  <option value="600">半粗</option>
                  <option value="700" selected>粗体</option>
                  <option value="800">特粗</option>
                </select>
              </div>
            </div>
            <div class="form-item" style="margin-top: 12px;">
              <label>字体</label>
              <div style="font-size: 12px; margin-bottom: 8px;">拉丁字体</div>
              <select id="pv-fontFamilyLatin"></select>
              <div style="font-size: 12px; margin: 12px 0 8px;">中日韩字体</div>
              <select id="pv-fontFamilyCJK"></select>
              <div id="pv-fontPreview" style="margin-top: 8px; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 24px; text-align: center;">
                サンプルテキスト Sample
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-title">颜色设置</div>
            <div class="form-grid">
              <div class="form-item">
                <label>文字颜色</label>
                <input type="color" id="pv-textColor" value="#f0f0f0">
              </div>
              <div class="form-item">
                <label>填充颜色</label>
                <input type="color" id="pv-fillColor" value="#ffde6e">
              </div>
            </div>
            <div class="form-grid" style="margin-top: 12px;">
              <div class="form-item">
                <label>下一句文字</label>
                <input type="color" id="pv-nextTextColor" value="#cccccc">
              </div>
              <div class="form-item">
                <label>下一句填充</label>
                <input type="color" id="pv-nextFillColor" value="#aaaaaa">
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-title">显示设置</div>
            <div class="form-grid">
              <div class="form-item">
                <label>画布宽度</label>
                <input type="number" id="pv-canvasWidth" value="1280" min="640" max="3840">
              </div>
              <div class="form-item">
                <label>画布高度</label>
                <input type="number" id="pv-canvasHeight" value="720" min="360" max="2160">
              </div>
            </div>
            <div class="switch-wrapper" style="margin-top: 12px;">
              <span class="switch-label">显示下一句预览</span>
              <label class="switch">
                <input type="checkbox" id="pv-showNextLine" checked>
                <span class="switch-slider"></span>
              </label>
            </div>
          </div>
        </div>

        <div class="content-card" data-panel="mode-scroll">
          <div class="card">
            <div class="card-title">字体和颜色</div>
            <div class="form-grid">

  <script src="scripts/config.js"></script>
  <script>
const LYRICS_DEFAULT = {
      timeout: 5000,
      retry: 1,
      rules: [
        {
          appName: '',
          sources: [
            { name: 'lrclib', enabled: true, priority: 1 },
            { name: 'qqmusic', enabled: true, priority: 2 },
            { name: 'kgmusic', enabled: true, priority: 3 }
          ]
        }
      ]
    };

    const ALL_SOURCES = ['lrclib', 'qqmusic', 'kgmusic'];

    const RENDERER_DEFAULT = {
      mode: 'karaoke',
      colors: { text: '#ffffff', bg: '#000000', glowRange: 1, outlineWidth: 1, outlineColor: '#ffffff' },
      font: { size: '2.4rem', weight: 'normal', family: 'Arial, Microsoft YaHei' },
      modeParams: {
        karaoke: { wordAnimation: true, animationDuration: 0.3, currentScale: 1.05 },
        scroll: { 
          wordAnimation: true,
          animationDuration: 0.3,
          currentScale: 1.05,
          alignOffset: 0,
          colors: { text: '#ffffff', bg: '#000000', glowRange: 1, outlineWidth: 1, outlineColor: '#ffffff' },
          font: { size: '2.4rem', weight: 'normal', family: 'Arial, Microsoft YaHei' }
        },
        blur: { 
          visibleLines: 9, 
          lineSpacing: 1.5, 
          opacityDecay: 0.15, 
          blurIncrement: 0.5, 
          scaleDecay: 0.1, 
          blurMax: 6,
          wordAnimation: true,
          animationDuration: 0.3,
          currentScale: 1.05,
          colors: { text: '#ffffff', bg: '#000000', glowRange: 1, outlineWidth: 1, outlineColor: '#ffffff' },
          font: { size: '2.4rem', weight: 'normal', family: 'Arial, Microsoft YaHei' }
        },
        pv: {
          template: 'pop_center',
          canvasSize: { width: 1280, height: 720 },
          showNextLine: true,
          baseFontSize: '48px',
          fontFamily: 'Noto Sans JP, Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif',
          fontWeight: 700,
          colors: {
            text: '#f0f0f0',
            fill: '#ffde6e',
            nextText: '#cccccc',
            nextFill: '#aaaaaa'
          },
          effects: {
            glowRange: 0,
            outlineWidth: 0,
            outlineColor: '#000000'
          }
        }
      }
    };

    let lyricsConfig = null;
    let rendererConfig = null;

     // 加载配置
     async function loadConfig() {
       // 加载歌词配置
       try {
         const res = await fetch(`${CONFIG_API_BASE}/config/lyrics`);
         if (res.ok) {
           lyricsConfig = await res.json();
         }
       } catch (e) {
         console.warn('[Config] Use default lyrics config');
       }
       if (!lyricsConfig) lyricsConfig = LYRICS_DEFAULT;

       // 加载渲染配置
       await window.configManager.load();
       rendererConfig = window.configManager.get();

       await fillForms();
     }

    async function fillForms() {
       // 歌词源配置
       document.getElementById('lyrics-timeout').value = lyricsConfig.timeout ?? 5000;
       document.getElementById('lyrics-retry').value = lyricsConfig.retry ?? 1;
       renderRulesList(lyricsConfig.rules || []);

// 渲染配置
        const currentMode = rendererConfig.mode || 'karaoke';
        document.getElementById('currentDisplayMode').value = currentMode;

        document.getElementById('textColor').value = (rendererConfig.colors?.text || '#ffffff').slice(0, 7);
        document.getElementById('bgColor').value = rendererConfig.colors?.bg || '#000000';
document.getElementById('fontSize').value = rendererConfig.font?.size || '2.4rem';
        document.getElementById('fontWeight').value = rendererConfig.font?.weight || 'normal';
        document.getElementById('glowRange').value = rendererConfig.colors?.glowRange ?? 1;
       document.getElementById('glowRangeValue').textContent = document.getElementById('glowRange').value;
       document.getElementById('outlineWidth').value = rendererConfig.colors?.outlineWidth ?? 1;
       document.getElementById('outlineWidthValue').textContent = document.getElementById('outlineWidth').value;
       document.getElementById('outlineColor').value = rendererConfig.colors?.outlineColor || '#ffffff';

// 加载字体列表并填充
        await loadSystemFonts();

        // 更新预览
        updateFontPreview();

        const karaoke = rendererConfig.modeParams?.karaoke || RENDERER_DEFAULT.modeParams.karaoke;
       document.getElementById('wordAnimation').checked = karaoke.wordAnimation !== false;
       document.getElementById('animationDuration').value = karaoke.animationDuration;
       document.getElementById('currentScale').value = karaoke.currentScale;

const scroll = rendererConfig.modeParams?.scroll || RENDERER_DEFAULT.modeParams.scroll;
        document.getElementById('scroll-wordAnimation').checked = scroll.wordAnimation !== false;
        document.getElementById('scroll-animationDuration').value = scroll.animationDuration;
        document.getElementById('scroll-currentScale').value = scroll.currentScale;
        document.getElementById('scroll-alignOffset').value = scroll.alignOffset ?? 0;
        document.getElementById('scroll-alignOffsetValue').textContent = scroll.alignOffset ?? 0;

        // scroll 字体和颜色
        if (scroll.colors) {
          document.getElementById('scroll-textColor').value = (scroll.colors.text || '#ffffff').slice(0, 7);
          document.getElementById('scroll-bgColor').value = scroll.colors.bg || '#000000';
          document.getElementById('scroll-glowRange').value = scroll.colors.glowRange ?? 1;
          document.getElementById('scroll-glowRangeValue').textContent = scroll.colors.glowRange ?? 1;
          document.getElementById('scroll-outlineWidth').value = scroll.colors.outlineWidth ?? 1;
          document.getElementById('scroll-outlineWidthValue').textContent = scroll.colors.outlineWidth ?? 1;
          document.getElementById('scroll-outlineColor').value = scroll.colors.outlineColor || '#ffffff';
        }
        document.getElementById('scroll-fontSize').value = scroll.font?.size || '2.4rem';
        document.getElementById('scroll-fontWeight').value = scroll.font?.weight || 'normal';

        const blur = rendererConfig.modeParams?.blur || RENDERER_DEFAULT.modeParams.blur;
        document.getElementById('visibleLines').value = blur.visibleLines;
        document.getElementById('lineSpacing').value = blur.lineSpacing;
        document.getElementById('opacityDecay').value = blur.opacityDecay;
        document.getElementById('blurIncrement').value = blur.blurIncrement;
        document.getElementById('scaleDecay').value = blur.scaleDecay;
        document.getElementById('blurMax').value = blur.blurMax;

        // blur 字体和颜色
        if (blur.colors) {
          document.getElementById('blur-textColor').value = (blur.colors.text || '#ffffff').slice(0, 7);
          document.getElementById('blur-bgColor').value = blur.colors.bg || '#000000';
          document.getElementById('blur-glowRange').value = blur.colors.glowRange ?? 1;
          document.getElementById('blur-glowRangeValue').textContent = blur.colors.glowRange ?? 1;
          document.getElementById('blur-outlineWidth').value = blur.colors.outlineWidth ?? 1;
          document.getElementById('blur-outlineWidthValue').textContent = blur.colors.outlineWidth ?? 1;
          document.getElementById('blur-outlineColor').value = blur.colors.outlineColor || '#ffffff';
        }
        document.getElementById('blur-fontSize').value = blur.font?.size || '2.4rem';
        document.getElementById('blur-fontWeight').value = blur.font?.weight || 'normal';
        document.getElementById('blur-wordAnimation').checked = blur.wordAnimation !== false;
        document.getElementById('blur-animationDuration').value = blur.animationDuration;
        document.getElementById('blur-currentScale').value = blur.currentScale;

        // PV 配置
        const pv = rendererConfig.modeParams?.pv || RENDERER_DEFAULT.modeParams.pv;
        document.getElementById('pv-template').value = pv.template || 'pop_center';
        document.getElementById('pv-canvasWidth').value = pv.canvasSize?.width || 1280;
        document.getElementById('pv-canvasHeight').value = pv.canvasSize?.height || 720;
        document.getElementById('pv-showNextLine').checked = pv.showNextLine !== false;
        document.getElementById('pv-fontSize').value = pv.baseFontSize || '48px';
        document.getElementById('pv-fontWeight').value = pv.fontWeight || '700';
        if (pv.colors) {
          document.getElementById('pv-textColor').value = (pv.colors.text || '#f0f0f0').slice(0, 7);
          document.getElementById('pv-fillColor').value = (pv.colors.fill || '#ffde6e').slice(0, 7);
          document.getElementById('pv-nextTextColor').value = (pv.colors.nextText || '#cccccc').slice(0, 7);
          document.getElementById('pv-nextFillColor').value = (pv.colors.nextFill || '#aaaaaa').slice(0, 7);
        }
        // 更新预览（在所有颜色值加载完成后）
        updateScrollFontPreview();
        updateBlurFontPreview();
        updatePVFontPreview();

        // 同步侧边栏和内容卡片到当前模式
        updateDisplayModeSidebar(currentMode);
     }

    // 加载系统字体列表
    async function loadSystemFonts() {
      try {
        const response = await fetch(`${CONFIG_API_BASE}/fonts`);
        const data = await response.json();
        if (!data.success || !data.fonts) return;

        const fonts = data.fonts;
        const latinSelect = document.getElementById('fontFamilyLatin');
        const cjkSelect = document.getElementById('fontFamilyCJK');
        const scrollLatinSelect = document.getElementById('scroll-fontFamilyLatin');
        const scrollCjkSelect = document.getElementById('scroll-fontFamilyCJK');
        const blurLatinSelect = document.getElementById('blur-fontFamilyLatin');
        const blurCjkSelect = document.getElementById('blur-fontFamilyCJK');
        const pvLatinSelect = document.getElementById('pv-fontFamilyLatin');
        const pvCjkSelect = document.getElementById('pv-fontFamilyCJK');

        const cjkKeywords = ['YaHei', 'Hei', 'Song', 'Kai', 'Ming', 'Fang', 'SC', 'TC', 'CN', 'JP', 'KR', 'Noto', 'WenQuanYi', 'Droid', 'Source Han', 'PingFang', 'Hiragino'];

        fonts.forEach(font => {
          const name = font.name;
          const isCJK = cjkKeywords.some(kw => name.includes(kw)) || /[\u4e00-\u9fff]/.test(name);

          const opt1 = document.createElement('option');
          opt1.value = name;
          opt1.textContent = name;
          latinSelect.appendChild(opt1);

          const optScroll1 = opt1.cloneNode(true);
          scrollLatinSelect.appendChild(optScroll1);

          const optBlur1 = opt1.cloneNode(true);
          blurLatinSelect.appendChild(optBlur1);

          const optPv1 = opt1.cloneNode(true);
          if (pvLatinSelect) pvLatinSelect.appendChild(optPv1);

          if (isCJK) {
            const opt2 = document.createElement('option');
            opt2.value = name;
            opt2.textContent = name;
            cjkSelect.appendChild(opt2);

            const optScroll2 = opt2.cloneNode(true);
            scrollCjkSelect.appendChild(optScroll2);

            const optBlur2 = opt2.cloneNode(true);
            blurCjkSelect.appendChild(optBlur2);

            const optPv2 = opt2.cloneNode(true);
            if (pvCjkSelect) pvCjkSelect.appendChild(optPv2);
          }
        });

        // 设置选中值 - karaoke
        const fontFamily = rendererConfig.font?.family || 'Arial, Microsoft YaHei';
        const parts = fontFamily.split(',').map(f => f.trim());
        const latin = parts[0] || 'Arial';
        const cjk = parts[1] || 'Microsoft YaHei';

        latinSelect.value = latin;
        cjkSelect.value = cjk;

        // 设置选中值 - scroll
        const scrollFontFamily = rendererConfig.modeParams?.scroll?.font?.family || fontFamily;
        const scrollParts = scrollFontFamily.split(',').map(f => f.trim());
        scrollLatinSelect.value = scrollParts[0] || latin;
        scrollCjkSelect.value = scrollParts[1] || cjk;

        // 设置选中值 - blur
        const blurFontFamily = rendererConfig.modeParams?.blur?.font?.family || fontFamily;
        const blurParts = blurFontFamily.split(',').map(f => f.trim());
        blurLatinSelect.value = blurParts[0] || latin;
        blurCjkSelect.value = blurParts[1] || cjk;

        // 设置选中值 - pv
        const pvFontFamily = rendererConfig.modeParams?.pv?.fontFamily || 'Noto Sans JP, Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif';
        const pvParts = pvFontFamily.split(',').map(f => f.trim());
        if (pvLatinSelect) pvLatinSelect.value = pvParts[0] || 'Noto Sans JP';
        if (pvCjkSelect) pvCjkSelect.value = pvParts[1] || 'Hiragino Kaku Gothic ProN';
      } catch (e) {
        console.warn('[Fonts] Load failed:', e);
      }
    }

function renderRulesList(rules) {
      const container = document.getElementById('rules-list');
      if (!rules || rules.length === 0) {
        container.innerHTML = '<p style="color: #888; text-align: center;">暂无规则，点击"新增规则"添加</p>';
        return;
      }

      // 找到兜底规则的索引
      let fallbackIndex = -1;
      rules.forEach((rule, i) => {
        if (rule.appName === '') fallbackIndex = i;
      });

      container.innerHTML = rules.map((rule, i) => {
        const isFallback = rule.appName === '';
        const enabledSources = rule.sources ? rule.sources.filter(s => s.enabled) : [];
        const sourceTags = enabledSources.map(s => `${s.name}:${s.priority}`).join(', ');

        const moveButtons = isFallback ? '' : `
          <button class="move-up" data-index="${i}" ${i === 0 ? 'disabled' : ''}>▲</button>
          <button class="move-down" data-index="${i}" ${(fallbackIndex !== -1 && i === fallbackIndex - 1) ? 'disabled' : ''}>▼</button>
        `;

        return `
          <div class="rule-item ${isFallback ? 'fallback' : ''}" data-index="${i}">
            <div class="rule-header">
              <span class="rule-title">${isFallback ? 'App: 其它所有' : `App: ${rule.appName}`}</span>
              <div class="rule-actions">
                ${moveButtons}
                <button class="delete-rule" data-index="${i}">删除</button>
              </div>
            </div>
            <div class="rule-info">
              <span class="rule-sources">
                ${sourceTags ? sourceTags.split(',').map(t => `<span class="source-tag">${t.trim()}</span>`).join('') : '无启用源'}
              </span>
            </div>
          </div>
        `;
      }).join('');
    }

    // 确保兜底规则永远在最底部
    function normalizeRules() {
      const rules = lyricsConfig.rules;
      if (!rules) return;
      const nonFallback = rules.filter(r => r.appName !== '');
      const fallback = rules.filter(r => r.appName === '');
      lyricsConfig.rules = [...nonFallback, ...fallback];
    }

    function collectLyricsConfig() {
      // 从 lyricsConfig 直接收集（因为规则是通过 Modal 编辑的）
      return {
        timeout: parseInt(document.getElementById('lyrics-timeout').value),
        retry: parseInt(document.getElementById('lyrics-retry').value),
        rules: lyricsConfig.rules
      };
    }

    // Modal 相关变量
    let currentRuleIndex = -1;
    let isNewRule = false;

    // 打开弹窗
    function openRuleModal(index, isNew = false) {
      currentRuleIndex = index;
      isNewRule = isNew;
      const modal = document.getElementById('ruleModal');
      const title = document.getElementById('modalTitle');

      if (isNew) {
        title.textContent = '新增规则';
        document.getElementById('ruleAppName').value = '';
        // 默认启用所有源，优先级从1开始
        const defaultSources = ALL_SOURCES.map((name, i) => ({
          name,
          enabled: true,
          priority: i + 1
        }));
        renderSourceConfigList(defaultSources);
      } else {
        const rule = lyricsConfig.rules[index];
        title.textContent = rule.appName === '' ? '编辑规则 - App: 其它所有' : `编辑规则 - App: ${rule.appName}`;
        document.getElementById('ruleAppName').value = rule.appName || '';
        renderSourceConfigList(rule.sources || []);
      }

      modal.classList.add('active');
    }

    // 渲染弹窗内的歌词源配置
    function renderSourceConfigList(sources) {
      const container = document.getElementById('sourceConfigList');
      container.innerHTML = sources.map((s, i) => `
        <div class="source-config-item">
          <input type="checkbox" class="source-enabled" data-index="${i}" ${s.enabled ? 'checked' : ''}>
          <span class="source-config-name">${s.name}</span>
          <div class="source-config-priority">
            优先级: <input type="number" class="source-priority" data-index="${i}" value="${s.priority}" min="1" max="100">
          </div>
        </div>
      `).join('');
    }

    // 关闭弹窗
    function closeRuleModal() {
      document.getElementById('ruleModal').classList.remove('active');
      currentRuleIndex = -1;
      isNewRule = false;
    }

    // 保存规则
    function saveRule() {
      const appName = document.getElementById('ruleAppName').value.trim();

      // 不允许输入"其它所有"
      if (appName === '其它所有' || appName === '其它所有app') {
        alert('不允许输入"其它所有"，请留空表示兜底规则');
        return;
      }

      // 收集源配置
      const sources = [];
      document.querySelectorAll('.source-config-item').forEach((item, i) => {
        const enabled = item.querySelector('.source-enabled').checked;
        const priority = parseInt(item.querySelector('.source-priority').value);
        const name = item.querySelector('.source-config-name').textContent;
        sources.push({ name, enabled, priority });
      });

      // 校验兜底规则
      if (appName === '') {
        // 检查是否已存在其他兜底规则
        const existingFallbackIndex = lyricsConfig.rules.findIndex((r, i) => r.appName === '' && i !== currentRuleIndex);
        if (existingFallbackIndex !== -1) {
          alert('已有兜底规则，不可重复创建');
          return;
        }
      }

      const newRule = { appName, sources };

      if (isNewRule) {
        lyricsConfig.rules.push(newRule);
      } else {
        lyricsConfig.rules[currentRuleIndex] = newRule;
      }

      // 确保兜底规则在最底部
      normalizeRules();
      renderRulesList(lyricsConfig.rules);
      closeRuleModal();
    }

    // 删除规则
    function deleteRule() {
      if (currentRuleIndex < 0) return;
      if (!confirm('确定要删除这条规则吗？')) return;

      lyricsConfig.rules.splice(currentRuleIndex, 1);
      renderRulesList(lyricsConfig.rules);
      closeRuleModal();
    }

    // 移动规则
    function moveRule(fromIndex, direction) {
      const toIndex = direction === 'up' ? fromIndex - 1 : fromIndex + 1;
      if (toIndex < 0 || toIndex >= lyricsConfig.rules.length) return;

      // 交换
      const temp = lyricsConfig.rules[fromIndex];
      lyricsConfig.rules[fromIndex] = lyricsConfig.rules[toIndex];
      lyricsConfig.rules[toIndex] = temp;

      // 确保兜底规则在最底部
      normalizeRules();
      renderRulesList(lyricsConfig.rules);
    }

    // 绑定事件
    document.getElementById('addRuleBtn').addEventListener('click', () => {
      // 新增规则直接打开弹窗
      openRuleModal(-1, true);
    });

    document.getElementById('rules-list').addEventListener('click', (e) => {
      const target = e.target;
      const ruleItem = target.closest('.rule-item');
      if (!ruleItem) return;

      const index = parseInt(ruleItem.dataset.index);

      if (target.classList.contains('move-up')) {
        moveRule(index, 'up');
      } else if (target.classList.contains('move-down')) {
        moveRule(index, 'down');
      } else if (target.classList.contains('delete-rule')) {
        if (confirm('确定要删除这条规则吗？')) {
          lyricsConfig.rules.splice(index, 1);
          normalizeRules();
          renderRulesList(lyricsConfig.rules);
        }
      } else {
        // 点击规则卡片打开编辑
        openRuleModal(index, false);
      }
    });

    document.getElementById('modalClose').addEventListener('click', closeRuleModal);
    document.getElementById('cancelRuleBtn').addEventListener('click', closeRuleModal);
    document.getElementById('saveRuleBtn').addEventListener('click', saveRule);
    document.getElementById('deleteRuleBtn').addEventListener('click', deleteRule);

            currentScale: parseFloat(document.getElementById('scroll-currentScale').value),
            alignOffset: parseInt(document.getElementById('scroll-alignOffset').value),
            colors: {
              text: document.getElementById('scroll-textColor').value,
              bg: document.getElementById('scroll-bgColor').value,
              glowRange: parseInt(document.getElementById('scroll-glowRange').value),
              outlineWidth: parseInt(document.getElementById('scroll-outlineWidth').value),
              outlineColor: document.getElementById('scroll-outlineColor').value
            },

              family: `${scrollLatinFont}, ${scrollCjkFont}`
            }
          },
          blur: {

            opacityDecay: parseFloat(document.getElementById('opacityDecay').value),
            blurIncrement: parseFloat(document.getElementById('blurIncrement').value),
            scaleDecay: parseFloat(document.getElementById('scaleDecay').value),
            blurMax: parseFloat(document.getElementById('blurMax').value),
            wordAnimation: document.getElementById('blur-wordAnimation').checked,
            animationDuration: parseFloat(document.getElementById('blur-animationDuration').value),
            currentScale: parseFloat(document.getElementById('blur-currentScale').value),
            colors: {
              text: document.getElementById('blur-textColor').value,
              bg: document.getElementById('blur-bgColor').value,
              glowRange: parseInt(document.getElementById('blur-glowRange').value),
              outlineWidth: parseInt(document.getElementById('blur-outlineWidth').value),

            },

              family: `${blurLatinFont}, ${blurCjkFont}`
            }
          },
          pv: {
            template: document.getElementById('pv-template').value,
            canvasSize: {
              width: parseInt(document.getElementById('pv-canvasWidth').value),
              height: parseInt(document.getElementById('pv-canvasHeight').value)
            },
            showNextLine: document.getElementById('pv-showNextLine').checked,
            baseFontSize: document.getElementById('pv-fontSize').value,
            fontFamily: `${pvLatinFont}, ${pvCjkFont}`,
            fontWeight: document.getElementById('pv-fontWeight').value,
            colors: {
              text: document.getElementById('pv-textColor').value,
              fill: document.getElementById('pv-fillColor').value,
              nextText: document.getElementById('pv-nextTextColor').value,
              nextFill: document.getElementById('pv-nextFillColor').value
            }
          }
        }
      };
    }

    function showStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.innerHTML = msg;
      el.className = 'status ' + (isError ? 'error' : 'success');
      setTimeout(() => { el.textContent = ''; }, 5000);
    }

    // Tab切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const tab = btn.dataset.tab;
        document.querySelectorAll('.main-layout').forEach(layout => {
          layout.classList.toggle('active', layout.dataset.layout === tab);
        });
      });
    });

    // 侧边栏切换
    document.querySelectorAll('.side-option').forEach(opt => {
      opt.addEventListener('click', () => {
        // 找到父级 sidebar
        const sidebar = opt.closest('.sidebar');
        sidebar.querySelectorAll('.side-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        opt.querySelector('input').checked = true;

        const panel = opt.dataset.panel;
        opt.closest('.main-layout').querySelectorAll('.content-card').forEach(card => {
          card.classList.toggle('active', card.dataset.panel === panel);
        });
      });
    });

    // 展示模式切换
    function updateDisplayModeSidebar(mode) {
      const sidebar = document.querySelector('[data-layout="display"] .sidebar');
      sidebar.querySelectorAll('.side-option').forEach(o => o.classList.remove('active'));
      sidebar.querySelectorAll('.side-option').forEach(o => {
        if (o.dataset.panel === 'mode-' + mode) {
          o.classList.add('active');
          o.querySelector('input').checked = true;
        }
      });
      document.querySelectorAll('[data-layout="display"] .content-card').forEach(card => {
        card.classList.toggle('active', card.dataset.panel === 'mode-' + mode);
      });
    }

    // 当前模式切换事件（仅保存配置，不改变sidebar显示）
    document.getElementById('currentDisplayMode').addEventListener('change', e => {
      // 模式选择仅影响保存的配置，不联动sidebar
    });

    // 字体预览更新
    function updateFontPreview() {
      const latinFont = document.getElementById('fontFamilyLatin').value;
      const cjkFont = document.getElementById('fontFamilyCJK').value;
      const textColor = document.getElementById('textColor').value;
      const glowRange = parseInt(document.getElementById('glowRange').value);
      const outlineWidth = parseInt(document.getElementById('outlineWidth').value);
      const outlineColor = document.getElementById('outlineColor').value;
      const fontSize = document.getElementById('fontSize').value;
      const fontWeight = document.getElementById('fontWeight').value;

      const preview = document.getElementById('fontPreview');
      if (preview) {
        preview.style.fontFamily = `"${latinFont}", "${cjkFont}", sans-serif`;
        preview.style.color = textColor;
        preview.style.fontSize = fontSize;
        preview.style.fontWeight = fontWeight;
        preview.style.textShadow = glowRange > 0 ? `0 0 ${glowRange}px ${textColor}` : 'none';
        preview.style.webkitTextStroke = outlineWidth > 0 ? `${outlineWidth}px ${outlineColor}` : '0';
      }
    }

    // 滚动模式字体预览更新
    function updateScrollFontPreview() {
      const latinFont = document.getElementById('scroll-fontFamilyLatin').value;
      const cjkFont = document.getElementById('scroll-fontFamilyCJK').value;
      const textColor = document.getElementById('scroll-textColor').value;
      const glowRange = parseInt(document.getElementById('scroll-glowRange').value);
      const outlineWidth = parseInt(document.getElementById('scroll-outlineWidth').value);
      const outlineColor = document.getElementById('scroll-outlineColor').value;
      const fontSize = document.getElementById('scroll-fontSize').value;
      const fontWeight = document.getElementById('scroll-fontWeight').value;

      const preview = document.getElementById('scroll-fontPreview');
      if (preview) {
        preview.style.fontFamily = `"${latinFont}", "${cjkFont}", sans-serif`;
        preview.style.color = textColor;
        preview.style.fontSize = fontSize;
        preview.style.fontWeight = fontWeight;
        preview.style.textShadow = glowRange > 0 ? `0 0 ${glowRange}px ${textColor}` : 'none';
        preview.style.webkitTextStroke = outlineWidth > 0 ? `${outlineWidth}px ${outlineColor}` : '0';
      }
    }

    // 模糊模式字体预览更新
    function updateBlurFontPreview() {
      const latinFont = document.getElementById('blur-fontFamilyLatin').value;
      const cjkFont = document.getElementById('blur-fontFamilyCJK').value;
      const textColor = document.getElementById('blur-textColor').value;
      const glowRange = parseInt(document.getElementById('blur-glowRange').value);
      const outlineWidth = parseInt(document.getElementById('blur-outlineWidth').value);
      const outlineColor = document.getElementById('blur-outlineColor').value;
      const fontSize = document.getElementById('blur-fontSize').value;
      const fontWeight = document.getElementById('blur-fontWeight').value;

      const preview = document.getElementById('blur-fontPreview');
      if (preview) {
        preview.style.fontFamily = `"${latinFont}", "${cjkFont}", sans-serif`;
        preview.style.color = textColor;
        preview.style.fontSize = fontSize;
        preview.style.fontWeight = fontWeight;
        preview.style.textShadow = glowRange > 0 ? `0 0 ${glowRange}px ${textColor}` : 'none';
        preview.style.webkitTextStroke = outlineWidth > 0 ? `${outlineWidth}px ${outlineColor}` : '0';
      }
    }

    // Range值更新
    document.getElementById('glowRange').addEventListener('input', e => {
      document.getElementById('glowRangeValue').textContent = e.target.value;
      updateFontPreview();
    });
    document.getElementById('outlineWidth').addEventListener('input', e => {
      document.getElementById('outlineWidthValue').textContent = e.target.value;
      updateFontPreview();
    });
    document.getElementById('fontFamilyLatin').addEventListener('change', updateFontPreview);
    document.getElementById('fontFamilyCJK').addEventListener('change', updateFontPreview);
    document.getElementById('textColor').addEventListener('input', updateFontPreview);
    document.getElementById('outlineColor').addEventListener('input', updateFontPreview);
    document.getElementById('fontSize').addEventListener('input', updateFontPreview);
    document.getElementById('fontWeight').addEventListener('change', updateFontPreview);

    // scroll 实时预览更新
    document.getElementById('scroll-glowRange').addEventListener('input', e => {
      document.getElementById('scroll-glowRangeValue').textContent = e.target.value;
      updateScrollFontPreview();
    });
    document.getElementById('scroll-outlineWidth').addEventListener('input', e => {
      document.getElementById('scroll-outlineWidthValue').textContent = e.target.value;
      updateScrollFontPreview();
    });
    document.getElementById('scroll-alignOffset').addEventListener('input', e => {
      document.getElementById('scroll-alignOffsetValue').textContent = e.target.value;
    });
    document.getElementById('scroll-fontFamilyLatin').addEventListener('change', updateScrollFontPreview);
    document.getElementById('scroll-fontFamilyCJK').addEventListener('change', updateScrollFontPreview);
    document.getElementById('scroll-textColor').addEventListener('input', updateScrollFontPreview);
    document.getElementById('scroll-outlineColor').addEventListener('input', updateScrollFontPreview);
    document.getElementById('scroll-fontSize').addEventListener('input', updateScrollFontPreview);
    document.getElementById('scroll-fontWeight').addEventListener('change', updateScrollFontPreview);

    // blur 实时预览更新
    document.getElementById('blur-glowRange').addEventListener('input', e => {
      document.getElementById('blur-glowRangeValue').textContent = e.target.value;
      updateBlurFontPreview();
    });
    document.getElementById('blur-outlineWidth').addEventListener('input', e => {
      document.getElementById('blur-outlineWidthValue').textContent = e.target.value;
      updateBlurFontPreview();
    });
    document.getElementById('blur-fontFamilyLatin').addEventListener('change', updateBlurFontPreview);
    document.getElementById('blur-fontFamilyCJK').addEventListener('change', updateBlurFontPreview);
    document.getElementById('blur-textColor').addEventListener('input', updateBlurFontPreview);
    document.getElementById('blur-outlineColor').addEventListener('input', updateBlurFontPreview);
    document.getElementById('blur-fontSize').addEventListener('input', updateBlurFontPreview);
    document.getElementById('blur-fontWeight').addEventListener('change', updateBlurFontPreview);

    // PV 字体预览更新函数
    function updatePVFontPreview() {
      const latinFont = document.getElementById('pv-fontFamilyLatin')?.value || 'Noto Sans JP';
      const cjkFont = document.getElementById('pv-fontFamilyCJK')?.value || 'Hiragino Kaku Gothic ProN';
      const textColor = document.getElementById('pv-textColor')?.value || '#f0f0f0';
      const fontSize = document.getElementById('pv-fontSize')?.value || '48px';
      const fontWeight = document.getElementById('pv-fontWeight')?.value || '700';

      const preview = document.getElementById('pv-fontPreview');
      if (preview) {
        preview.style.fontFamily = `"${latinFont}", "${cjkFont}", sans-serif`;
        preview.style.color = textColor;
        preview.style.fontSize = fontSize;
        preview.style.fontWeight = fontWeight;
      }
    }

    // PV 配置事件监听
    document.getElementById('pv-fontFamilyLatin')?.addEventListener('change', updatePVFontPreview);
    document.getElementById('pv-fontFamilyCJK')?.addEventListener('change', updatePVFontPreview);
    document.getElementById('pv-textColor')?.addEventListener('input', updatePVFontPreview);
    document.getElementById('pv-fillColor')?.addEventListener('input', updatePVFontPreview);
    document.getElementById('pv-nextTextColor')?.addEventListener('input', updatePVFontPreview);
    document.getElementById('pv-nextFillColor')?.addEventListener('input', updatePVFontPreview);
    document.getElementById('pv-fontSize')?.addEventListener('input', updatePVFontPreview);
    document.getElementById('pv-fontWeight')?.addEventListener('change', updatePVFontPreview);

    updatePVFontPreview();

    // 保存
    document.getElementById('saveBtn').addEventListener('click', async () => {
      // 保存歌词配置
      const lyricsData = collectLyricsConfig();
      try {
        await fetch(`${CONFIG_API_BASE}/config/lyrics`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(lyricsData)
        });
      } catch (e) {
        console.warn('[Save] Lyrics config save failed:', e);
      }

      // 保存渲染配置
      const rendererData = collectRendererConfig();
      await window.configManager.save(rendererData);

      showStatus('配置已保存，<a href="index.html" style="color: #00ffff;">点击查看效果</a>');
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
      lyricsConfig = LYRICS_DEFAULT;
      await window.configManager.reset();
      rendererConfig = window.configManager.get();
      fillForms();
      showStatus('已恢复默认配置');
    });

    loadConfig();
  </script>

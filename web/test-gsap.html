<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Stagger Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #888;
        }

        #test-line {
            font-size: 32px;
            letter-spacing: 8px;
        }

        #test-line span {
            display: inline-block;
            background: linear-gradient(to right, rgb(255, 255, 255) 50%, rgb(60, 60, 60) 50%);
            background-size: 200% 100%;
            background-position-x: 100%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        button {
            margin-top: 40px;
            padding: 12px 32px;
            font-size: 18px;
            background: #0ff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0cc;
        }
    </style>
</head>

<body>
    <div id="test-line">
        <span>一</span><span>笑</span><span>倾</span><span>城</span><span>一</span><span>笑</span><span>倾</span><span>城</span><span>汪</span><span>苏</span>
    </div>
    <button id="playBtn">播放动画</button>

    <script>
        const chars = document.querySelectorAll('#test-line span');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', () => {
            const charDuration = 2; // 每个字变亮的过程时长，这里假设每个字都是2秒过程

            // 3. 计算最终 Stagger，使得视觉上平滑
            const stagger = charDuration * 0.8;

            gsap.to(chars, {
                backgroundPositionX: '0%',
                duration: charDuration,
                stagger: stagger,
                ease: 'none',
                overwrite: 'auto'
            });
        });

    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Stagger Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #888;
        }

        #test-line {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 8px;
        }

        #test-line span {
            display: inline-block;
            background: linear-gradient(to right, rgb(255, 255, 255) 50%, rgb(60, 60, 60) 50%);
            background-size: 200% 100%;
            background-position-x: 100%;
            background-clip: text;
            -webkit-background-clip: text;
            /*filter: drop-shadow(0 0 0px rgba(255, 255, 255, 1));*/
            color: transparent;
            -webkit-text-stroke: 1.5px #fff;
        }

        button {
            margin-top: 40px;
            padding: 12px 32px;
            font-size: 18px;
            background: #0ff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0cc;
        }
    </style>
</head>

<body>
    <div id="test-line">
        <span>一</span><span>笑</span><span>倾</span><span>城</span><span>一</span><span>笑</span><span>倾</span><span>城</span><span>汪</span><span>苏</span>
    </div>
    <button id="playBtn">播放动画</button>

    <script>
        const chars = document.querySelectorAll('#test-line span');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', () => {
            const tl = gsap.timeline({ paused: true });

            // 每个字的开始时间（毫秒）和持续时间
            const words = [
                { start: 0, duration: 500 },
                { start: 500, duration: 700 },
                { start: 1200, duration: 600 },
                { start: 1800, duration: 700 },
                { start: 2500, duration: 500 },
                { start: 3000, duration: 700 },
                { start: 3700, duration: 600 },
                { start: 4300, duration: 700 },
                { start: 5000, duration: 500 },
                { start: 5500, duration: 500 }
            ];

            chars.forEach((char, i) => {
                char.style.backgroundPositionX = '100%';
                char.style.filter = "drop-shadow(0 0 0px rgba(255, 255, 255, 0))";
            });

            words.forEach((word, i) => {
                const char = chars[i];
                const startTime = word.start / 1000;
                const duration = word.duration / 1000;

                // 使用 absolute time position
                tl.to(char, {
                    backgroundPositionX: '0%',
                    duration: duration,
                    ease: 'none'
                }, startTime);
                tl.to(char,
                    {
                        filter: "drop-shadow(0 0 20px rgba(255, 255, 255, 1))",
                        duration: duration,
                        ease: 'none'
                    }, startTime);
                tl.to(char,
                    {
                        filter: "drop-shadow(0 0 0px rgba(255, 255, 255, 1))",
                        duration: 1,
                        ease: 'none'
                    }, startTime + duration);
            });

            tl.play();
        });
    </script>
</body>

</html>
